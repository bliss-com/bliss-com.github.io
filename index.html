<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bliss bot</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
    background: radial-gradient(circle at 30% 20%, #0c0f14, #05070a 60%, #000);
    color: #cfcfcf;
    min-height: 100vh;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 60px;
}

/* LEFT MENU */
.menu {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.menu-item {
    width: 320px;
    padding: 16px 20px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    cursor: pointer;
    transition: all 0.25s ease;
}

.menu-item:hover {
    background: rgba(255,255,255,0.08);
    transform: translateX(6px);
}

.menu-item.active {
    background: rgba(255,255,255,0.12);
    box-shadow: 0 0 30px rgba(255,255,255,0.08);
    color: #fff;
}

.left {
    display: flex;
    align-items: center;
    gap: 14px;
}

.icon {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
}

.arrow {
    opacity: 0.4;
}

/* RIGHT CARD */
.card {
    width: 260px;
    height: 380px;
    border-radius: 24px;
    padding: 24px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
}

@keyframes scan {
    0% { top: -100%; }
    100% { top: 100%; }
}

.avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    margin: 0 auto;
    background: radial-gradient(circle, #1a1f2b, #0a0c12);
    box-shadow: 0 0 25px rgba(0,150,255,0.2);
}

.center {
    text-align: center;
    margin-top: 10px;
}

.center small {
    opacity: 0.4;
    letter-spacing: 2px;
    font-size: 10px;
}

.center h2 {
    margin-top: 6px;
    font-weight: 500;
}

.stats {
    margin-top: 20px;
}

.row {
    display: flex;
    justify-content: space-between;
    margin-top: 12px;
    font-size: 14px;
}

.online {
    color: #00ff9c;
}

.footer {
    font-size: 11px;
    opacity: 0.3;
    margin-top: 20px;
}

/* MOBILE */
@media (max-width: 768px) {
    body {
        flex-direction: column;
        justify-content: center;
        padding: 30px;
        gap: 40px;
    }

    .menu {
        width: 100%;
    }

    .menu-item {
        width: 100%;
    }

    .card {
        width: 100%;
        max-width: 320px;
    }
}
</style>
</head>

<body>

<div class="menu">
    <div class="menu-item active" onclick="go('commands.html')">
        <div class="left">
            <div class="icon">></div>
            Commands
        </div>
        <div class="arrow">→</div>
    </div>

    <div class="menu-item" onclick="go('studio.html')">
        <div class="left"><div class="icon">🎨</div>Studio</div>
        <div class="arrow">→</div>
    </div>

    <div class="menu-item" onclick="go('dashboard.html')">
        <div class="left"><div class="icon">▦</div>Dashboard</div>
        <div class="arrow">→</div>
    </div>

    <div class="menu-item" onclick="go('avatars.html')">
        <div class="left"><div class="icon">👥</div>Avatars</div>
        <div class="arrow">→</div>
    </div>

    <div class="menu-item" onclick="go('casino.html')">
        <div class="left"><div class="icon">🎰</div>Casino</div>
        <div class="arrow">→</div>
    </div>

    <div class="menu-item" onclick="go('docs.html')">
        <div class="left"><div class="icon">📖</div>Docs</div>
        <div class="arrow">→</div>
    </div>

    <div class="menu-item" onclick="go('purchase.html')">
        <div class="left"><div class="icon">🛒</div>Purchase</div>
        <div class="arrow">→</div>
    </div>

    <div class="menu-item" onclick="go('info.html')">
        <div class="left"><div class="icon">ℹ️</div>Information</div>
        <div class="arrow">→</div>
    </div>

    <div class="footer">
        Navigate with arrow keys | Enter to select
    </div>
</div>

<div class="card">
    <div>
        <div class="avatar"></div>
        <div class="center">
            <small>NODE_ID</small>
            <h2>Kayo</h2>
        </div>
    </div>

    <div class="stats">
        <div class="row">
            <span>Status</span>
            <span class="online">● ONLINE</span>
        </div>
        <div class="row">
            <span>Uptime</span>
            <span class="online">99.9%</span>
        </div>
    </div>
</div>

<script>
function go(page) {
    window.location.href = page;
}
</script>

</body>
</html>
