<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Clone</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
body {
    background: radial-gradient(circle at 30% 20%, #0c0f14, #05070a 60%, #000);
    color: #cfcfcf;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
}
.card {
    width: 100%;
    max-width: 660px;
    border-radius: 18px;
    padding: 16px 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
}
/* AVATAR */
.avatar-wrap {
    position: relative;
    width: 56px;
    height: 56px;
    flex-shrink: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
}
.avatar {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    background: radial-gradient(circle at 40% 35%, #1e2a3a, #0a0c12);
    box-shadow: 0 0 18px rgba(0,150,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: box-shadow 0.2s;
}
.avatar img { width:100%; height:100%; object-fit:cover; display:block; }
.avatar svg { width:36px; height:36px; opacity:0.85; }
.avatar-overlay {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    font-size: 16px;
    pointer-events: none;
}
.avatar-wrap:hover .avatar-overlay,
.avatar-wrap:active .avatar-overlay { opacity: 1; }
#avatarInput { display: none; }

.card-info { flex:1; min-width:0; }
.card-meta { font-size:9px; letter-spacing:2px; opacity:0.35; text-transform:uppercase; margin-bottom:2px; font-family:'Courier New',monospace; }
.card-name { font-size:18px; font-weight:600; color:#fff; letter-spacing:-0.01em; }
.card-status { display:flex; align-items:center; gap:6px; margin-top:3px; font-size:11px; color:#00ff9c; font-family:'Courier New',monospace; letter-spacing:1px; }
.dot { width:6px; height:6px; border-radius:50%; background:#00ff9c; box-shadow:0 0 6px #00ff9c; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.card-right { text-align:right; flex-shrink:0; }
.card-addr { font-size:9px; font-family:'Courier New',monospace; opacity:0.3; letter-spacing:1px; margin-bottom:4px; }
.card-uptime { font-size:13px; color:#00ff9c; font-family:'Courier New',monospace; font-weight:600; }
.progress-bar { position:absolute; bottom:0; left:0; height:2px; width:99.9%; background:linear-gradient(90deg,#00ff9c11,#00ff9c66,#00ff9c11); border-radius:0 0 18px 18px; }

.menu { display:flex; flex-direction:column; gap:4px; width:100%; max-width:660px; }
.menu-item { padding:14px 20px; border-radius:14px; display:flex; align-items:center; justify-content:space-between; background:transparent; border:1px solid transparent; cursor:pointer; transition:all 0.2s ease; -webkit-tap-highlight-color:transparent; }
.menu-item:hover, .menu-item.active { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.08); }
.left { display:flex; align-items:center; gap:16px; }
.icon { width:38px; height:38px; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; transition:background 0.2s; }
.menu-item:hover .icon, .menu-item.active .icon { background:rgba(255,255,255,0.1); }
.item-text { display:flex; flex-direction:column; gap:1px; }
.item-name { font-size:15px; color:#bbb; font-weight:500; transition:color 0.2s; }
.menu-item:hover .item-name, .menu-item.active .item-name { color:#fff; }
.item-sub { font-size:11px; color:#555; font-family:'Courier New',monospace; letter-spacing:0.5px; max-height:0; overflow:hidden; transition:max-height 0.2s ease, color 0.2s; }
.menu-item:hover .item-sub, .menu-item.active .item-sub { max-height:20px; color:#888; }
.arrow { opacity:0; color:#6699ff; font-size:16px; transition:opacity 0.2s, transform 0.2s; transform:translateX(-4px); }
.menu-item:hover .arrow, .menu-item.active .arrow { opacity:1; transform:translateX(0); }

.hint { margin-top:16px; font-size:10px; letter-spacing:2.5px; text-transform:uppercase; opacity:0.2; font-family:'Courier New',monospace; }

@media (max-width:480px) {
    body { padding:24px 14px; }
    .card { padding:14px 16px; gap:12px; }
    .card-name { font-size:16px; }
    .menu-item { padding:13px 16px; }
    .item-sub { max-height:20px !important; color:#666 !important; }
    .arrow { opacity:0.6 !important; transform:translateX(0) !important; }
}
</style>
</head>
<body>

<div class="card">
    <div class="avatar-wrap" onclick="document.getElementById('avatarInput').click()" title="Tap to change image">
        <div class="avatar" id="avatarEl">
            <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="18" cy="18" r="14" stroke="#4488ff" stroke-width="1" opacity="0.4"/>
                <path d="M12 14 L18 10 L24 14 L24 22 L18 26 L12 22 Z" stroke="#4488ff" stroke-width="1.2" fill="none" opacity="0.7"/>
                <line x1="18" y1="10" x2="18" y2="26" stroke="#4488ff" stroke-width="0.8" opacity="0.4"/>
                <line x1="12" y1="14" x2="24" y2="22" stroke="#4488ff" stroke-width="0.8" opacity="0.4"/>
                <line x1="24" y1="14" x2="12" y2="22" stroke="#4488ff" stroke-width="0.8" opacity="0.4"/>
                <circle cx="18" cy="18" r="3" fill="#4488ff" opacity="0.6"/>
            </svg>
        </div>
        <div class="avatar-overlay">📷</div>
    </div>
    <input type="file" id="avatarInput" accept="image/*">

    <div class="card-info">
        <div class="card-meta">NODE_ID</div>
        <div class="card-name">Bliss</div>
        <div class="card-status"><span class="dot"></span>ONLINE</div>
    </div>
    <div class="card-right">
        <div class="card-addr">0x482F ▪</div>
        <div class="card-uptime">99.9%</div>
    </div>
    <div class="progress-bar"></div>
</div>

<div class="menu">
    <div class="menu-item active" onclick="go('commands.html')">
        <div class="left"><div class="icon">&gt;_</div><div class="item-text"><span class="item-name">Commands</span><span class="item-sub">Browse all bot commands</span></div></div>
        <div class="arrow">→</div>
    </div>
    <div class="menu-item" onclick="go('studio.html')">
        <div class="left"><div class="icon">🎨</div><div class="item-text"><span class="item-name">Studio</span><span class="item-sub">Create &amp; customize</span></div></div>
        <div class="arrow">→</div>
    </div>
    <div class="menu-item" onclick="go('dashboard.html')">
        <div class="left"><div class="icon">▦</div><div class="item-text"><span class="item-name">Dashboard</span><span class="item-sub">Manage your server</span></div></div>
        <div class="arrow">→</div>
    </div>
    <div class="menu-item" onclick="go('avatars.html')">
        <div class="left"><div class="icon">👥</div><div class="item-text"><span class="item-name">Avatars</span><span class="item-sub">Browse user avatars</span></div></div>
        <div class="arrow">→</div>
    </div>
   
    <div class="menu-item" onclick="go('docs.html')">
        <div class="left"><div class="icon">📖</div><div class="item-text"><span class="item-name">Docs</span><span class="item-sub">Read the documentation</span></div></div>
        <div class="arrow">→</div>
    </div>
    <div class="menu-item" onclick="go('purchase.html')">
        <div class="left"><div class="icon">🛒</div><div class="item-text"><span class="item-name">Purchase</span><span class="item-sub">Buy Kayo for your server</span></div></div>
        <div class="arrow">→</div>
    </div>
</div>

<div class="hint">Double tap to select</div>

<script>
function go(page) { window.location.href = page; }

document.getElementById('avatarInput').addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    document.getElementById('avatarEl').innerHTML = '<img src="' + url + '" alt="avatar">';
});

const items = document.querySelectorAll('.menu-item');
let current = 0;
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { items[current].classList.remove('active'); current=(current+1)%items.length; items[current].classList.add('active'); }
    else if (e.key === 'ArrowUp') { items[current].classList.remove('active'); current=(current-1+items.length)%items.length; items[current].classList.add('active'); }
    else if (e.key === 'Enter') { items[current].click(); }
});
</script>
</body>
</html>
