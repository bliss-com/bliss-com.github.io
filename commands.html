<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Commands</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Satoshi:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-1000: #0e0e0e;
      --bg-950:  #111212;
      --bg-900:  #161717;
      --bg-850:  #1c1b1b;
      --bg-800:  #222323;
      --bg-750:  #2a2b2b;
      --blue-1:  #5b9cf6;
      --blue-2:  #7ab0ff;
      --blue-3:  #4a8ae8;
      --discord: #5865f2;
      --text-muted: #6b7280;
      --tag-bg: #1e1f1f;
      --tag-border: #2a2b2b;
      --card-border: #242525;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Satoshi', 'Inter', sans-serif;
      background: var(--bg-1000);
      color: #fff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    #topbar {
      position: relative;
      padding: 30px 40px 0;
      z-index: 100;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1024px;
      margin: 0 auto;
      width: 100%;
    }
    .nav-logo { display: flex; align-items: center; flex: 1; }
    .nav-logo svg { height: 28px; width: auto; }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 40px;
      padding: 16px 24px;
      border-radius: 20px;
      background: radial-gradient(1161.83% 494.55% at 50% 49.09%, #111212 5.32%, #1c1b1b 30.31%);
      backdrop-filter: blur(7.5px);
    }
    .nav-links a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: -0.01em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #ccc; }

    .nav-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex: 1;
      gap: 20px;
    }
    .btn-dashboard {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: var(--discord);
      border-radius: 9999px;
      text-decoration: none;
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      opacity: 0.5;
      cursor: not-allowed;
      position: relative;
    }
    .btn-dashboard svg { width: 20px; height: 20px; }
    .coming-soon-badge {
      position: absolute;
      bottom: -6px;
      right: -18px;
      background: #ff3b30;
      color: #fff;
      font-size: 8px;
      font-weight: 800;
      padding: 2px 5px;
      border-radius: 4px;
      transform: rotate(8deg);
      line-height: 1.3;
      text-align: center;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    /* MAIN */
    #main {
      padding: 24px;
    }
    .inner {
      max-width: 1024px;
      margin: 0 auto;
      padding-top: 5rem;
      padding-bottom: 20rem;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }
    .page-title {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -0.03em;
    }
    .title-icon {
      width: 48px; height: 48px;
      background: var(--bg-850);
      border-radius: 9999px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .title-icon svg { width: 24px; height: 24px; color: var(--blue-1); }

    .search-wrap { position: relative; }
    .search-label {
      position: absolute;
      top: -28px;
      left: 0; right: 0;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .btn-search {
      background: var(--bg-900);
      border: 1px solid var(--bg-750);
      border-radius: 16px;
      padding: 10px 12px;
      color: var(--blue-3);
      cursor: pointer;
      display: flex; align-items: center;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .btn-search:hover {
      background: var(--bg-750);
      box-shadow: 0 0 0 2px var(--bg-750);
    }
    .btn-search svg { width: 28px; height: 28px; }

    /* CATEGORY TABS */
    .tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 32px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-arrow {
      background: none;
      border: 1px solid var(--bg-750);
      border-radius: 12px;
      color: #fff;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .tab-arrow:hover { background: var(--bg-850); }
    .tab-arrow svg { width: 18px; height: 18px; }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 12px;
      border: 1px solid transparent;
      background: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .tab:hover { background: var(--bg-850); }
    .tab.active {
      background: var(--bg-850);
      border-color: var(--bg-750);
    }
    .tab-count {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .tab svg { width: 16px; height: 16px; opacity: 0.7; }

    /* COMMAND GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--bg-900);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--bg-750); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .cmd-name {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .cmd-name .star { margin-right: 4px; }

    .btn-copy {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px;
      border-radius: 6px;
      display: flex;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .btn-copy:hover { color: #fff; }
    .btn-copy svg { width: 20px; height: 20px; }

    .cmd-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 18px;
      line-height: 1.5;
      font-style: italic;
    }

    .card-section-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }
    .tag {
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      border-radius: 8px;
      padding: 3px 10px;
      font-size: 12px;
      color: #d1d5db;
      font-style: italic;
    }
    .tag.perm {
      font-style: normal;
      color: #e5e7eb;
      font-weight: 500;
    }
    .none-text {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* SEARCH MODAL */
    .search-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      align-items: flex-start;
      justify-content: center;
      padding-top: 120px;
    }
    .search-modal.open { display: flex; }
    .search-box {
      width: 560px;
      max-width: 90vw;
      background: var(--bg-850);
      border: 1px solid var(--bg-750);
      border-radius: 16px;
      overflow: hidden;
    }
    .search-input-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--bg-750);
    }
    .search-input-wrap svg { width: 20px; height: 20px; color: var(--text-muted); flex-shrink: 0; }
    .search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-results { max-height: 400px; overflow-y: auto; }
    .search-result {
      padding: 12px 18px;
      cursor: pointer;
      border-bottom: 1px solid var(--bg-800);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.1s;
    }
    .search-result:hover { background: var(--bg-800); }
    .search-result-name { font-weight: 600; font-size: 14px; }
    .search-result-cat { font-size: 12px; color: var(--text-muted); }
    .search-empty { padding: 24px 18px; color: var(--text-muted); font-size: 14px; text-align: center; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--bg-800);
      background: var(--bg-950);
      padding: 56px 24px;
      box-shadow: 0 -4px 40px rgba(91,156,246,0.06);
    }
    .footer-inner {
      max-width: 1024px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px 24px;
    }
    @media (max-width: 640px) { .footer-inner { grid-template-columns: 1fr; } }
    .footer-logo svg { height: 32px; width: auto; }
    .footer-copy {
      font-size: 12px;
      color: #d1d5db;
      line-height: 1.6;
      margin-top: 16px;
    }
    .footer-col h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .footer-col a {
      display: block;
      margin-bottom: 16px;
      color: var(--blue-1);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: color 0.15s;
    }
    .footer-col a:hover { color: var(--blue-2); }

    /* COPY TOAST */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-850);
      border: 1px solid var(--bg-750);
      color: #fff;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

let activeCategory = 0;

function buildTabs() {
  const tabs = document.getElementById('tabs');
  const arrows = tabs.querySelectorAll('.tab-arrow');
  const frag = document.createDocumentFragment();
  frag.appendChild(arrows[0]);

  CATEGORIES.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === activeCategory ? ' active' : '');
    btn.innerHTML = cat.icon + `<span>${cat.name}</span><span class="tab-count">${cat.count}</span>`;
    btn.onclick = () => selectCategory(i);
    frag.appendChild(btn);
  });
  frag.appendChild(arrows[1]);
  tabs.innerHTML = '';
  tabs.appendChild(frag);
}

function selectCategory(idx) {
  activeCategory = idx;
  buildTabs();
  renderGrid();
}

function renderGrid() {
  const cat = CATEGORIES[activeCategory];
  const grid = document.getElementById('grid');
  grid.innerHTML = cat.commands.map(cmd => `
    <div class="card">
      <div class="card-header">
        <div class="cmd-name">${cmd.name}</div>
        <button class="btn-copy" onclick="copyCmd('${cmd.name.replace(/'/g,"\\'")}')">
          <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="cmd-desc">${cmd.desc}</div>
      <div class="card-section-label">arguments</div>
      ${cmd.args.length > 0
        ? `<div class="tags">${cmd.args.map(a=>`<span class="tag">${a}</span>`).join('')}</div>`
        : `<div class="none-text">none</div>`
      }
      <div class="card-section-label">permissions</div>
      ${cmd.perms.length > 0
        ? `<div class="tags">${cmd.perms.map(p=>`<span class="tag perm">${p}</span>`).join('')}</div>`
        : `<div class="none-text">none</div>`
      }
    </div>
  `).join('');
}

function scrollTabs(dir) {
  document.getElementById('tabs').scrollBy({ left: dir * 200, behavior: 'smooth' });
}

function copyCmd(name) {
  navigator.clipboard.writeText('/' + name).catch(()=>{});
  showToast('Copied /' + name);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function openSearch() {
  document.getElementById('searchModal').classList.add('open');
  setTimeout(() => document.getElementById('searchInput').focus(), 50);
  renderSearch();
}
function closeSearch() { document.getElementById('searchModal').classList.remove('open'); }
function closeSearchOutside(e) { if (e.target === document.getElementById('searchModal')) closeSearch(); }

function renderSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const results = document.getElementById('searchResults');
  const all = CATEGORIES.flatMap(cat => cat.commands.map(cmd => ({ ...cmd, cat: cat.name })));
  const filtered = q ? all.filter(c => c.name.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q)) : all.slice(0, 12);
  if (!filtered.length) {
    results.innerHTML = '<div class="search-empty">No commands found</div>';
    return;
  }
  results.innerHTML = filtered.map(c => `
    <div class="search-result" onclick="jumpTo('${c.cat}','${c.name.replace(/'/g,"\\'")}')">
      <div>
        <div class="search-result-name">${c.name}</div>
        <div class="search-result-cat">${c.cat}</div>
      </div>
    </div>
  `).join('');
}

function jumpTo(catName, cmdName) {
  const idx = CATEGORIES.findIndex(c => c.name === catName);
  if (idx >= 0) { selectCategory(idx); }
  closeSearch();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSearch();
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
});

buildTabs();
renderGrid();
</script>
